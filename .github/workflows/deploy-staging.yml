name: Deploy Staging

# Staging = recreate simples (sem blue-green). Gatilho: push em `develop`.
# O build acontece no GitHub-hosted runner e publica imagens no GHCR; o runner
# self-hosted da VPS apenas faz pull + up + migrate + health-check.
#
# Pré-requisitos no runner de staging:
# - docker + docker compose v2
# - apps/api/.env e apps/web/.env preenchidos no checkout
# - acesso de leitura ao GHCR via GITHUB_TOKEN do workflow

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  build-images:
    name: Build and push images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolver namespace do registry
        id: registry
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "prefix=ghcr.io/${owner_lc}/boilarplate" >> "$GITHUB_OUTPUT"

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push api
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.prefix }}-api:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=staging-api
          cache-to: type=gha,mode=max,scope=staging-api

      - name: Build and push web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.registry.outputs.prefix }}-web:${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=staging-web
          cache-to: type=gha,mode=max,scope=staging-web

  deploy:
    name: Recreate staging
    runs-on: [self-hosted, staging]
    needs: build-images
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Resolver namespace do registry
        id: registry
        run: |
          owner_lc="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "api_image=ghcr.io/${owner_lc}/boilarplate-api" >> "$GITHUB_OUTPUT"
          echo "web_image=ghcr.io/${owner_lc}/boilarplate-web" >> "$GITHUB_OUTPUT"

      - name: Login no GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanity — envs presentes
        run: |
          test -f apps/api/.env || { echo "::error::apps/api/.env ausente no runner"; exit 1; }
          test -f apps/web/.env || { echo "::error::apps/web/.env ausente no runner"; exit 1; }

      # Staging usa a cor 'blue' como cor ÚNICA (sem switch de tráfego). O
      # deploy-color.sh agora apenas baixa a imagem publicada no registry,
      # sobe shared (apps-shared) + a cor, roda migrations e faz o health-check.
      - name: Deploy (recreate cor blue)
        env:
          API_IMAGE: ${{ steps.registry.outputs.api_image }}
          WEB_IMAGE: ${{ steps.registry.outputs.web_image }}
        run: sudo --preserve-env=PATH,API_IMAGE,WEB_IMAGE,IMAGE_TAG,GITHUB_REPOSITORY_OWNER bash infra/deploy/deploy-color.sh blue "${GITHUB_SHA}"
