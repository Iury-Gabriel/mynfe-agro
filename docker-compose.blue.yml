name: apps-blue

# =============================================================================
# docker-compose.blue.yml — cor BLUE (api + web).
#
# Postgres/Redis NÃO vivem aqui — vêm do docker-compose.shared.yml e são
# alcançados pela rede externa `apps-net` (nomes de serviço `postgres`/`redis`).
#
# As imagens api+web são publicadas pelo CI em registry e puxadas pelo deploy:
#   COMPOSE_PROJECT_NAME=apps-blue \
#   docker compose --env-file apps/api/.env \
#     -f docker-compose.shared.yml -f docker-compose.blue.yml pull api web
#   COMPOSE_PROJECT_NAME=apps-blue \
#   docker compose --env-file apps/api/.env \
#     -f docker-compose.shared.yml -f docker-compose.blue.yml up -d --no-build api web
#
# Portas host da cor BLUE: API=${BLUE_API_PORT:-3341}, WEB=${BLUE_WEB_PORT:-8081}.
# O nginx do host aponta pra cor ATIVA (ver infra/nginx/).
# =============================================================================

services:
  api:
    image: ${API_IMAGE:-apps-api}:${IMAGE_TAG:-latest}
    container_name: apps-blue-api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    ports:
      - "${BLUE_API_PORT:-3341}:3333"
    networks:
      - apps-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3333/health"]
      interval: 5s
      timeout: 3s
      retries: 8
      start_period: 20s

  web:
    image: ${WEB_IMAGE:-apps-web}:${IMAGE_TAG:-latest}
    container_name: apps-blue-web
    restart: unless-stopped
    ports:
      - "${BLUE_WEB_PORT:-8081}:80"
    networks:
      - apps-net
    depends_on:
      - api

networks:
  apps-net:
    name: apps-net
    external: true
