  #     PGADMIN_DEFAULT_EMAIL: admin@apps.local
  #     PGADMIN_DEFAULT_PASSWORD: admin
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #   ports:
  #     - "5050:80"
  #   depends_on: [postgres]

  # redis-commander:
  #   image: rediscommander/redis-commander:latest
  #   container_name: apps-redis-commander
  #   restart: unless-stopped
  #   environment:
  #     REDIS_HOSTS: local:redis:6379
  #   ports:
  #     - "8081:8081"
  #   depends_on: [redis]

volumes:
  postgres-data:
  redis-data:
