name: apps-shared

# =============================================================================
# docker-compose.shared.yml — infra compartilhada entre as cores blue/green.
#
# Sobe Postgres + Redis UMA vez. As cores (blue/green) sobem só api+web e se
# conectam aqui pela rede externa `apps-net`.
#
# Banco é compartilhado → migrations DEVEM ser backward-compatible
# (expand/contract). Ver docs/infra/deploy.md.
#
# Uso (prod, na VPS):
#   docker compose --env-file apps/api/.env -f docker-compose.shared.yml up -d
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: apps-postgres
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-template}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - apps-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-template}"]
      interval: 2s
      timeout: 3s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: apps-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    networks:
      - apps-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 15

volumes:
  postgres-data:
  redis-data:

networks:
  apps-net:
    name: apps-net
