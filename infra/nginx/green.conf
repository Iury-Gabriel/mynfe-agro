# =============================================================================
# infra/nginx/green.conf — vhost do host apontando pra cor GREEN.
#
# Igual ao blue.conf, mas aponta pras portas da cor GREEN
# (GREEN_API_PORT / GREEN_WEB_PORT). Ver infra/nginx/README.md.
#
#   /api/  -> API green  (127.0.0.1:3342)
#   /      -> WEB green  (127.0.0.1:8082)
# =============================================================================

upstream green_api {
    server 127.0.0.1:3342;
}

upstream green_web {
    server 127.0.0.1:8082;
}

server {
    listen 80;
    server_name _;

    # Backend
    location /api/ {
        proxy_pass http://green_api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
    }

    # Frontend (SPA servida pelo nginx do container web)
    location / {
        proxy_pass http://green_web/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
