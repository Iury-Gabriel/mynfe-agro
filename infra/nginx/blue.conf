# =============================================================================
# infra/nginx/blue.conf — vhost do host apontando pra cor BLUE.
#
# Roda no nginx do HOST (não no container). Faz:
#   /api/  -> API da cor blue   (127.0.0.1:3341, mapeada do container :3333)
#   /      -> WEB da cor blue   (127.0.0.1:8081, nginx do container servindo a SPA)
#
# Ative apontando o symlink:
#   ln -sfn /etc/nginx/sites-available/blue.conf /etc/nginx/sites-enabled/active.conf
# (o switch.sh faz isso automaticamente). Ver infra/nginx/README.md.
#
# As portas DEVEM casar com BLUE_API_PORT / BLUE_WEB_PORT do deploy.env e dos
# composes. Troque server_name pelo domínio real.
# =============================================================================

upstream blue_api {
    server 127.0.0.1:3341;
}

upstream blue_web {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    server_name _;

    # Backend
    location /api/ {
        proxy_pass http://blue_api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 300s;
    }

    # Frontend (SPA servida pelo nginx do container web)
    location / {
        proxy_pass http://blue_web/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
